<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Bootstrap Customizado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">

    <!-- Formulários -->
    <div class="container mt-4 d-flex justify-content-center">
        <form class="custom-form">

            <!-- Imagem centralizada dentro do formulário -->
            <div class="d-flex justify-content-center mb-3">
                <img src="../logosenai.png" style="width:400px; height:100px; border-radius:10px;">
            </div>

            <p></p>
            <h2 style="text-align: center; height: 5vh; color: rgb(255, 255, 255);"> Login
            </h2>

            <!-- Campo para o e-mail -->
            <div class="col-sm-12 mb-3">
                <label for="email" class="form-label">E-mail <i class="bi bi-envelope-at"></i> </label>
                <input type="email" class="form-control custom-input" id="email" 
                placeholder="example@gmail.com">
            </div>

            <!-- Senha -->
            <div class="col-sm-12 mb-3">
                <label for="senha" class="form-label">Senha <i class="bi bi-lock-fill"></i></label>
                <input type="password" class="form-control custom-input" id="senha" placeholder="*******">
            </div>

            <!-- Botão de enviar -->
            <button type="submit" class="btn btn-primary custom-button d-grid gap-3 d-md-block border border-whith border-2">Enviar</button>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
