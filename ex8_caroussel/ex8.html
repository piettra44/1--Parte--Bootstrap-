<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


    <!-- Construindo slider "Carroussel" do zero -->
     <div class="container mt-3">
        <div id="carouselExemplo" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                
                <!-- Primeiro item do Carroussel -->
                <div class="carousel-item active">
                    <img src="https://placehold.co/600x400/000/fff" alt="slide-1" class="d-block w-100">
                </div>

                <!-- segundo item do Carroussel -->
                <div class="carousel-item active">
                    <img src="https://placehold.co/600x400/orange/fff" alt="slide-2" class="d-block w-100">
                </div>

                <!-- terceiro item do Carroussel -->
                <div class="carousel-item active">
                    <img src="https://placehold.co/600x400/gray/fff" alt="slide-3" class="d-block w-100">
                </div>


            </div>

            <!-- Adicionando botôes de controle de carroussel -->

            <!-- botão de retorno -->
             <button class="carousel-control-prev" type="button" 
             data-bs-target="#carouselExemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
             </button>

            <!-- botão de avançar -->
             <button class="carousel-control-next" type="button" 
             data-bs-target="#carouselExemplo" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
             </button>
            

        </div>
     </div>
    

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
