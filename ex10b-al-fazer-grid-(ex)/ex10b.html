<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promoções da Loja</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    /* =========================================
       Ícones do carrossel com fundo escuro
       para melhor visibilidade
    ========================================= */
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
      filter: invert(1);
      background-color: #dc358e;
      border-radius: 50%;
    }

    /* Padroniza o tamanho de todas as imagens do carrossel */
    .carousel-inner img {
        height: 480px;       /* Defina a altura que preferir */
        object-fit: cover;   /* Recorta a imagem para preencher sem distorcer */
        object-position: center; /* Centraliza o foco da imagem */
    }

    /* =========================================
       Barra de progresso vermelha
    ========================================= */
    #progress-bar {
      background-color: #dc358e; /* Vermelho Bootstrap (danger) */
    }
  </style>
</head>
<body>

  <!-- =========================================
       NAVBAR
       Barra de navegação com logo, links
       e botão de contato
  ========================================= -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #dc358e;">
    <div class="container">

      <!-- Logo / Marca -->
      <a href="#" class="navbar-brand">
        <i class="bi bi-android2 fs-1"></i>
      </a>

      <!-- Botão hamburguer (visível em telas pequenas) -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#minhaNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links de navegação -->
      <div class="collapse navbar-collapse" id="minhaNavbar">
        <div class="navbar-nav ms-auto">

          <a href="#" class="nav-link text-light">
            <i class="bi bi-house fs-4"></i> Home
          </a>

          <a href="#" class="nav-link text-light">
            <i class="bi bi-person fs-4"></i> Perfil
          </a>

          <!-- Botão que abre o modal de contato -->
          <button
            class="btn btn-light ms-2"
            data-bs-toggle="modal"
            data-bs-target="#contatoModal">
            <i class="bi bi-envelope"></i> Contato
          </button>

        </div>
      </div>

    </div>
  </nav>
  <!-- /NAVBAR -->


  <!-- =========================================
       CARROSSEL DE IMAGENS
       Exibe imagens em destaque com controles
       de navegação anterior/próximo
  ========================================= -->
  <div class="d-flex justify-content-center mt-4">
    <div
      id="carouselExemplo"
      class="carousel slide w-50"
      data-bs-ride="carousel">

      <!-- Itens do carrossel -->
      <div class="carousel-inner">

        <div class="carousel-item active">
          <img src="../foto.jpeg" class="d-block w-100" alt="Slide 1">
        </div>

        <div class="carousel-item">
          <img src="../foto2.jpeg" class="d-block w-100" alt="Slide 2">
        </div>

        <div class="carousel-item">
          <img src="../foto3.jpeg" class="d-block w-100" alt="Slide 3">
        </div>

      </div>

      <!-- Botão: slide anterior -->
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carouselExemplo"
        data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>

      <!-- Botão: próximo slide -->
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carouselExemplo"
        data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>

    </div>
  </div>
  <!-- /CARROSSEL -->


  <!-- =========================================
       TEXTO DE CHAMADA
  ========================================= -->
  <h5 class="text-center mt-4">
    Garanta seu desconto na camisa autografada!
  </h5>


  <!-- =========================================
       BARRA DE PROGRESSO
       Mostra o percentual de desconto
       desbloqueado pelo usuário
  ========================================= -->
  <div class="d-flex justify-content-center">
    <div class="progress w-50 mb-3">
      <div
        id="progress-bar"
        class="progress-bar"
        style="width: 0%">
        0%
      </div>
    </div>
  </div>


  <!-- =========================================
       BOTÃO DE AÇÃO
       Incrementa a barra de progresso
       em 10% a cada clique
  ========================================= -->
  <div class="text-center">
    <button
      class="btn btn-secondary"
      onclick="updateProgress(10)">
      Garantir Desconto
    </button>
  </div>


  <!-- =========================================
       MODAL DE CONTATO
       Formulário com validação nativa do
       Bootstrap (nome, email e mensagem)
  ========================================= -->
  <div class="modal fade" id="contatoModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <!-- Cabeçalho do modal -->
        <div class="modal-header">
          <h5 class="modal-title">Entre em Contato</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Formulário com validação Bootstrap -->
        <form class="needs-validation" novalidate>

          <div class="modal-body">

            <!-- Campo: Nome -->
            <div class="mb-3">
              <label class="form-label">Nome</label>
              <input type="text" class="form-control" required>
              <div class="invalid-feedback">Digite seu nome</div>
            </div>

            <!-- Campo: Email -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" required>
              <div class="invalid-feedback">Digite um email válido</div>
            </div>

            <!-- Campo: Mensagem -->
            <div class="mb-3">
              <label class="form-label">Mensagem</label>
              <textarea class="form-control" rows="3" required></textarea>
              <div class="invalid-feedback">Digite uma mensagem</div>
            </div>

          </div>

          <!-- Rodapé do modal com ações -->
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
            <button class="btn btn-dark" type="submit">Enviar</button>
          </div>

        </form>

      </div>
    </div>
  </div>
  <!-- /MODAL -->


  <!-- Bootstrap JS (bundle inclui Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>

    /* =========================================
       updateProgress(valor)
       Incrementa a barra de progresso pelo
       valor informado (em %). Ao atingir 100%,
       exibe um alerta de parabéns.
    ========================================= */
    function updateProgress(valor) {
      const progressBar = document.getElementById("progress-bar");
      let larguraAtual = parseInt(progressBar.style.width);

      // Só atualiza se ainda não chegou a 100%
      if (larguraAtual < 100) {
        let novaLargura = larguraAtual + valor;

        // Garante que não ultrapasse 100%
        if (novaLargura > 100) {
          novaLargura = 100;
        }

        // Atualiza largura e texto da barra
        progressBar.style.width = novaLargura + "%";
        progressBar.innerText = novaLargura + "%";

        // Mensagem ao completar 100%
        if (novaLargura === 100) {
          alert("🎉 Parabéns! Você desbloqueou o desconto da camisa autografada!");
        }
      }
    }


    /* =========================================
       Validação de formulários Bootstrap
       Percorre todos os forms com a classe
       .needs-validation e impede o envio
       caso os campos obrigatórios estejam
       vazios ou inválidos.
    ========================================= */
    (() => {
      'use strict';

      const forms = document.querySelectorAll('.needs-validation');

      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {

          if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
          }

          form.classList.add('was-validated');
        });
      });
    })();

  </script>

</body>
</html>
