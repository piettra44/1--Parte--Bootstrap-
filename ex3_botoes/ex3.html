<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>


    <!-- <button type="button" class="btn">Base class</button>
    <button type="button" class="btn btn-info">Info</button> -->

    <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-primary border border-info border border-3">Azul</button>
        <button class="btn btn-danger border border-info border border-3 ms-3">Red</button>
        
    </div>

    <!-- Botão de icone -->
    <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-primary p-2">
            <i class="bi bi-search pe-2"></i>Pesquisar 
        </button>
    </div>

    <div class="container d-flex justify-content-end mt-0">
        <button class="btn btn-warning position-absolute top-0 end-0 m-2 border border-dark border-3">
            <i class="bi bi-brightness-high pe-2"></i>Sol
        </button>
    </div>
     

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
